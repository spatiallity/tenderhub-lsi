<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBU LSI Procurement Intelligence</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #f0f4fa;
      --card: #ffffff;
      --text: #0e1726;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --shadow: 0 4px 20px rgba(15, 23, 42, .07);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, .12);
      --r: 16px;
      --r-sm: 10px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body,
    #root {
      min-height: 100%;
      margin: 0
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font-family: 'Plus Jakarta Sans', sans-serif
    }

    button {
      cursor: pointer
    }

    input,
    select,
    textarea {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 13px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    textarea {
      resize: vertical
    }

    table {
      border-collapse: collapse;
      width: 100%
    }

    th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      background: #fafcff;
      text-align: left;
      padding: 11px 12px;
      white-space: nowrap;
    }

    td {
      padding: 12px;
      border-top: 1px solid #eef2f7;
      vertical-align: top
    }

    tbody tr:hover td {
      background: #f8fbff
    }

    ::-webkit-scrollbar {
      width: 7px;
      height: 7px
    }

    ::-webkit-scrollbar-track {
      background: #eef2f7
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px
    }

    .app-shell {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: 220px;
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      z-index: 20;
      transition: width .25s cubic-bezier(.4, 0, .2, 1), padding .25s cubic-bezier(.4, 0, .2, 1);
    }

    .sidebar.collapsed {
      width: 60px;
      padding: 20px 6px;
    }

    .sidebar.collapsed .brand-kicker,
    .sidebar.collapsed .brand-title,
    .sidebar.collapsed .brand-sub,
    .sidebar.collapsed .sidebar-bottom,
    .sidebar.collapsed .nav-label {
      display: none;
    }

    .sidebar.collapsed .nav-button {
      justify-content: center;
      padding: 10px;
      gap: 0;
    }

    .sidebar.collapsed .nav-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 16px;
      height: 16px;
      font-size: 9px;
    }

    .sidebar-toggle {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .15s;
    }

    .sidebar-toggle:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    .brand-kicker {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .1em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.2;
    }

    .nav-button {
      border: 0;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: transparent;
      color: #475569;
      font-weight: 700;
      font-size: 13px;
      text-align: left;
      margin-bottom: 5px;
      transition: .18s ease;
      position: relative;
    }

    .nav-badge {
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #dc2626;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      margin-left: auto;
      line-height: 1;
      animation: pulseDot 1.4s ease-in-out infinite;
    }

    .nav-button.active .nav-badge {
      background: rgba(255, 255, 255, .3);
    }

    .nav-button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, .25);
    }

    .main {
      margin-left: 220px;
      width: calc(100% - 220px);
      padding: 24px;
      transition: margin-left .25s cubic-bezier(.4, 0, .2, 1), width .25s cubic-bezier(.4, 0, .2, 1);
    }

    .main.collapsed {
      margin-left: 60px;
      width: calc(100% - 60px);
    }

    .toast-notif {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #16a34a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(22, 163, 74, .3);
      z-index: 100;
      animation: slideInToast .3s cubic-bezier(.34, 1.4, .64, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes slideInToast {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .main-inner {
      max-width: 1520px;
      margin: 0 auto
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card.clickable {
      transition: .18s ease;
      cursor: pointer
    }

    .card.clickable:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg)
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
    }

    .muted {
      color: var(--muted)
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 9px 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 14px rgba(37, 99, 235, .25);
    }

    .btn.ghost {
      background: #f8fafc
    }

    .btn.small {
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      line-height: 1.35;
    }

    .badge.blue {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe
    }

    .badge.green {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0
    }

    .badge.amber {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a
    }

    .badge.red {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca
    }

    .badge.purple {
      background: #f3e8ff;
      color: #6b21a8;
      border: 1px solid #d8b4fe
    }

    .badge.gray {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1
    }

    .badge.cyan {
      background: #ecfeff;
      color: #0e7490;
      border: 1px solid #a5f3fc
    }

    .badge.indigo {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe
    }

    .badge.teal {
      background: #f0fdfa;
      color: #0f766e;
      border: 1px solid #99f6e4
    }

    .pill-tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: #f1f5f9;
      border-radius: 12px;
      flex-wrap: wrap;
    }

    .pill-tab {
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 800;
    }

    .pill-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, .25);
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      transition: width .25s ease;
    }

    .activity-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x proximity;
    }

    .activity-chip {
      min-width: 280px;
      scroll-snap-align: start;
      border: 1px solid var(--border);
      background: #f8fbff;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      gap: 10px;
      cursor: pointer;
      transition: .18s ease;
    }

    .activity-chip:hover {
      border-color: #bfdbfe;
      background: #eff6ff
    }

    .red-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--danger);
      animation: pulseDot 1.4s ease-in-out infinite;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .32);
      backdrop-filter: blur(2px);
      z-index: 40;
    }

    .side-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 500px;
      max-width: 95vw;
      background: #fff;
      z-index: 50;
      border-radius: 20px 0 0 20px;
      box-shadow: -10px 0 40px rgba(15, 23, 42, .16);
      overflow-y: auto;
      animation: slideIn .25s cubic-bezier(.34, 1.4, .64, 1);
    }

    .panel-head {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 15px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-body {
      padding: 18px
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
    }

    .icon-tile {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .timeline-row {
      display: flex;
      gap: 12px;
      align-items: flex-start
    }

    .timeline-node {
      width: 23px;
      height: 23px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      border: 2px solid #e2e8f0;
      background: #fff;
    }

    .timeline-line {
      width: 2px;
      height: 24px;
      background: #e2e8f0;
      margin: 0 auto
    }

    .switch {
      width: 42px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: #cbd5e1;
      position: relative;
      transition: .18s ease;
      flex: none;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #fff;
      transition: .18s ease;
    }

    .switch.on {
      background: var(--primary)
    }

    .switch.on::after {
      left: 21px
    }

    .status-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    @keyframes pulseDot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .45;
        transform: scale(.75)
      }
    }

    @media(max-width:1180px) {
      .grid-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }

      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }

      .grid-2 {
        grid-template-columns: 1fr
      }
    }

    @media(max-width:760px) {
      .sidebar {
        position: static;
        width: 100%;
        min-height: auto
      }

      .app-shell {
        display: block
      }

      .main {
        margin-left: 0;
        width: 100%;
        padding: 14px
      }

      .grid-4,
      .grid-3 {
        grid-template-columns: 1fr
      }

      .form-grid {
        grid-template-columns: 1fr
      }

      .side-panel {
        width: 100%;
        max-width: 100%;
        border-radius: 16px 16px 0 0
      }
    }
  </style>
</head>

      const active = Object.entries(keywords).flatMap(([portfolio, items]) =>

      const lower = tender.nama.toLowerCase();
      const matched = active.filter(k => lower.includes(k.text.toLowerCase()));
      const byPortfolio = matched.reduce((acc, k) => ({ ...acc, [k.portfolio]: (acc[k.portfolio] || 0) + 1 }), {});
      const recommendation = Object.entries(byPortfolio).sort((a, b) => b[1] - a[1])[0]?.[0] || tender.portofolio;
      const samePortfolioHit = matched.some(k => k.portfolio === recommendation);
      const score = Math.min(100, Math.max(matched.length ? 38 : 18, matched.length * 28 + (samePortfolioHit ? 12 : 0)));
      return { score, matched: matched.map(k => k.text), recommendation };
    };

        recommendation,
        readiness: Math.min(100, readinessBase + urgencyBonus + matched.length * 4),
        daysUntilSelection: days,
      };
    };

    function PotensiChartPanel({ tenders, openTender }) {
      const PIE_COLORS = ["#2563eb", "#16a34a", "#d97706", "#7c3aed", "#0e7490", "#be123c", "#0369a1", "#15803d", "#dc2626", "#6d28d9"];
      const sorted = [...tenders].sort((a, b) => b.hps - a.hps);
      const top10 = sorted.slice(0, 10);
      const othersTotal = sorted.slice(10).reduce((s, t) => s + t.hps, 0);
      const segments = [...top10.map((t, i) => ({ label: t.nama.length > 35 ? t.nama.slice(0, 35) + "..." : t.nama, value: t.hps, color: PIE_COLORS[i % PIE_COLORS.length], id: t.id }))];
      if (othersTotal > 0) segments.push({ label: `${sorted.length - 10} tender lainnya`, value: othersTotal, color: "#94a3b8", id: null });
      const total = segments.reduce((s, seg) => s + seg.value, 0);

      let cumAngle = 0;
      const arcs = segments.map(seg => {
        const angle = (seg.value / total) * 360;
        const startAngle = cumAngle;
        cumAngle += angle;
        return { ...seg, startAngle, angle };
      });

      const describeArc = (cx, cy, r, startAngle, endAngle) => {
        const rad = a => (a - 90) * Math.PI / 180;
        const x1 = cx + r * Math.cos(rad(startAngle));
        const y1 = cy + r * Math.sin(rad(startAngle));
        const x2 = cx + r * Math.cos(rad(endAngle));
        const y2 = cy + r * Math.sin(rad(endAngle));
        const largeArc = endAngle - startAngle > 180 ? 1 : 0;
        return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
      };

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
            <svg width={220} height={220} viewBox="0 0 220 220">
              {arcs.map((arc, i) => (
                <path key={i} d={describeArc(110, 110, 100, arc.startAngle, arc.startAngle + arc.angle - 0.5)} fill={arc.color} stroke="#fff" strokeWidth={2} style={{ cursor: arc.id ? "pointer" : "default", transition: ".15s" }} onClick={() => arc.id && openTender(arc.id)}>
                  <title>{arc.label}: {formatRupiah(arc.value)}</title>
                </path>
              ))}
              <circle cx={110} cy={110} r={45} fill="#fff" />
              <text x={110} y={106} textAnchor="middle" style={{ fontSize: 11, fontWeight: 800, fill: "#64748b" }}>Total</text>
              <text x={110} y={122} textAnchor="middle" style={{ fontSize: 13, fontWeight: 800, fill: "#0e1726" }}>{formatRupiah(total)}</text>
            </svg>
          </div>
          <div style={{ display: "grid", gap: 6 }}>
            {segments.map((seg, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", border: "1px solid var(--border)", borderRadius: 10, background: "#fff", cursor: seg.id ? "pointer" : "default" }} onClick={() => seg.id && openTender(seg.id)}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: seg.color, flex: "none" }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{seg.label}</div>
                </div>
                <div style={{ fontSize: 12, fontWeight: 800, whiteSpace: "nowrap" }}>{formatRupiah(seg.value)}</div>
                <div className="muted" style={{ fontSize: 11, whiteSpace: "nowrap" }}>{(seg.value / total * 100).toFixed(1)}%</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function exportTendersCSV(tenders) {
      const headers = ["No", "Nama Paket", "Instansi", "Level", "Provinsi", "HPS", "Portofolio", "Metode", "Tahap", "Deadline", "Status Internal"];
      const rows = tenders.map((t, i) => [i + 1, `"${t.nama}"`, `"${t.instansi}"`, t.level, t.provinsi, t.hps, t.recommendation, t.metode, t.currentStageName, t.deadlineStage, t.internalStatus]);
      const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "tender_intelligence_export.csv"; a.click();
      URL.revokeObjectURL(url);
    }

    function exportExpertCV(expert, cvContent) {
      const isStruct = typeof cvContent === 'object' && cvContent !== null;
      let cvString = cvContent || "";
      if (isStruct) {
        const pendidikanText = (cvContent.pendidikan || []).map(p => `- ${p.jurusan} di ${p.universitas} (${p.tahunMasuk}-${p.tahunLulus})`).join("\n");
        const pekerjaanText = (cvContent.pekerjaan || []).map(p => `- ${p.posisi} (${p.tahunMasukKeluar})\n  Deskripsi: ${p.deskripsi}`).join("\n");
        cvString = `Pendidikan:\n${pendidikanText}\n\nPekerjaan:\n${pekerjaanText}`;
      }

      const rows = [
        ["CURRICULUM VITAE TENAGA AHLI", ""],
        ["", ""],
        ["Nama", expert.nama],
        ["Instansi", expert.instansi],
        ["Keahlian", expert.keahlian.join(", ")],
        ["Rating", expert.rating],
        ["", ""],
        ["ISI CV", ""],
        [cvString.replace(/"/g, '""'), ""]
      ];
      const csv = rows.map(r => `"${r[0]}","${r[1]}"`).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `CV_${expert.nama.replace(/\s+/g, '_')}.csv`; a.click();
      URL.revokeObjectURL(url);
    }

            <div style={{ display: "grid", gap: 12 }}>

                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                    <Badge color={portfolioColor[portfolio]}>{portfolio}</Badge>
                    <span className="muted" style={{ fontSize: 12, fontWeight: 800 }}>{items.filter(k => k.active).length} aktif</span>

                    <th>Sumber LPSE</th>
                    <th>Pagu / HPS</th>
                    <th>Jenis Pengadaan</th>
                    <th>Sumber Dana</th>
                    <th>Sub-Portofolio</th>
                    <th>Status Tahap Tender</th>
                    <th>Deadline</th>
                    <th>Metode Pemilihan</th>
                    <th>Status Internal</th>
                    <th></th>
                  </tr>
                </thead>

                  {filteredTenders.map(t => {

                    return (
                      <tr key={t.id} style={{ background: isNew ? "#f0fdf4" : undefined }}>

                          <div style={{ fontWeight: 800, lineHeight: 1.35 }}>
                            {t.nama}
                            {isNew && <Badge color="green" style={{ marginLeft: 6 }}>Baru</Badge>}
                          </div>
                          <div className="muted" style={{ fontSize: 11, marginTop: 4, display: "flex", alignItems: "center", gap: 5 }}><MapPin size={12} />{t.lokasi_pekerjaan || t.provinsi}</div>
                          <div className="muted" style={{ fontSize: 10, marginTop: 2 }}>KD Tender: {t.kd_tender} | TA {t.tahun_anggaran}</div>
                        </td>
                        <td style={{ minWidth: 170 }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#0e1726" }}>{t.instansi}</div>
                          <div className="muted" style={{ fontSize: 11, marginTop: 2 }}>{t.nama_satker}</div>
                        </td>

                          <div style={{ fontWeight: 800 }}>{formatRupiah(t.pagu)}</div>
                          <div className="muted" style={{ fontSize: 11 }}>HPS: {formatRupiah(t.hps)}</div>

                        <td><Badge color={t.sumber_dana === "APBN" ? "blue" : t.sumber_dana === "APBD" ? "teal" : "amber"}>{t.sumber_dana}</Badge></td>

                          <div style={{ display: "grid", gap: 6 }}>
                            <Badge color={t.currentStageColor}>{t.currentStageName}</Badge>
                            <div className="progress-track" style={{ height: 6 }}>
                              <div className="progress-fill" style={{ width: `${t.currentStage / t.totalStages * 100}%` }} />

    function TenderDetail({ tender, note, setNote, saveNote, deleteNote, savedAt, status, setStatus, users, assignedPIC, assignPIC }) {
      const stages = getStages(tender.metode);

      return (
        <div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 9 }}>
            <Badge color={portfolioColor[tender.recommendation]}>{tender.recommendation}</Badge>
            <Badge color="gray">{tender.mtd_pemilihan || tender.metode}</Badge>
            <Badge color={levelColor[tender.level]}>{tender.level}</Badge>
            {tender.jenis_pengadaan && <Badge color="indigo">{tender.jenis_pengadaan}</Badge>}
            {tender.sumber_dana && <Badge color={tender.sumber_dana === "APBN" ? "blue" : "teal"}>{tender.sumber_dana}</Badge>}
            {tender.kualifikasi_paket && <Badge color="amber">{tender.kualifikasi_paket}</Badge>}
          </div>
          <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: "-.02em", lineHeight: 1.35 }}>{tender.nama}</div>
          <div className="muted" style={{ fontSize: 12, marginTop: 5 }}>
            {tender.instansi} {tender.nama_satker ? `· ${tender.nama_satker}` : ""}
          </div>
          <div style={{ marginTop: 4 }}>
            <a href={tender.lpse} target="_blank" rel="noopener noreferrer" style={{ color: "#2563eb", textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12, fontWeight: 600 }}>{tender.lpse}<ExternalLink size={11} /></a>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, margin: "16px 0" }}>
            <MiniKpi label="Pagu Anggaran" value={formatRupiah(tender.pagu || tender.hps)} />
            <MiniKpi label="Nilai HPS" value={formatRupiah(tender.hps)} />
            <MiniKpi label="Sisa Hari" value={`${tender.daysLeft}h`} color={tender.daysLeft <= 3 ? "#dc2626" : tender.daysLeft <= 7 ? "#d97706" : "#16a34a"} />
            <MiniKpi label="Tahun Anggaran" value={tender.tahun_anggaran || "-"} />
          </div>

          <div className="card" style={{ boxShadow: "none", background: "#f8fbff", marginBottom: 16, padding: 12 }}>
            <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 10 }}>Informasi Pengadaan (INAPROC)</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px" }}>
              {[
                ["Jenis KLPD", tender.jenis_klpd],
                ["Jenis Pengadaan", tender.jenis_pengadaan],
                ["Metode Pemilihan", tender.mtd_pemilihan],
                ["Metode Evaluasi", tender.mtd_evaluasi],
                ["Metode Kualifikasi", tender.mtd_kualifikasi || tender.metode],
                ["Kualifikasi Paket", tender.kualifikasi_paket],
                ["Sumber Dana", tender.sumber_dana],
                ["Kontrak Pembayaran", tender.kontrak_pembayaran],
                ["Kode Tender", tender.kd_tender],
                ["Kode RUP", tender.kd_rup],
                ["Tgl. Pengumuman", tender.tgl_pengumuman],
                ["Lokasi Pekerjaan", tender.lokasi_pekerjaan],
                ["Nama PPK", tender.nama_ppk],
                ["Nama Pokja", tender.nama_pokja],
              ].filter(([, v]) => v).map(([label, value]) => (
                <div key={label}>
                  <div className="muted" style={{ fontSize: 10, fontWeight: 700 }}>{label}</div>
                  <div style={{ fontSize: 12, fontWeight: 600, marginTop: 2 }}>{value}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 7 }}>Keyword Match</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {tender.matched.length ? tender.matched.map(k => <Badge key={k} color="green">{k}</Badge>) : <Badge color="gray">Belum ada keyword cocok</Badge>}
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 9 }}>Timeline Tahapan Tender</div>
            <div>
              {stages.map(([stage, color], i) => {
                const num = i + 1;
                const past = num < tender.currentStage;
                const current = num === tender.currentStage;
                const start = dateFrom(TODAY, (num - tender.currentStage) * 3 - 2);
                const end = dateFrom(TODAY, (num - tender.currentStage) * 3);
                const changes = tender.changes?.[num] || 0;
                return (
                  <div key={stage} className="timeline-row">
                    <div>
                      <div className="timeline-node" style={{
                        borderColor: current ? "var(--primary)" : "#e2e8f0",
                        background: past ? "#f1f5f9" : current ? "#eff6ff" : "#fff"
                      }}>
                        {past ? <CheckCircle size={13} color="#94a3b8" /> : current ? <span className="red-dot" style={{ background: "#2563eb" }} /> : <Circle size={12} color="#cbd5e1" />}
                      </div>
                      {i < stages.length - 1 && <div className="timeline-line" />}
                    </div>
                    <div style={{ paddingBottom: 12, flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: current ? 800 : 700, color: past ? "#94a3b8" : "#0e1726" }}>{num}. {stage}</div>
                      <div className="muted" style={{ fontSize: 11, marginTop: 2 }}>{formatDate(start)} - {formatDate(end)}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 5 }}>
                        {current && <Badge color={color}>Tahap saat ini</Badge>}
                        {changes > 0 && <Badge color="amber">{changes} kali perubahan</Badge>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="card" style={{ boxShadow: "none", background: "#f8fbff", marginBottom: 16 }}>
            <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 7 }}>Status Internal</div>
            <select value={status} onChange={e => setStatus(e.target.value)} style={{ width: "100%", marginBottom: 10 }}>
              {["Dipantau", "Akan Diikuti", "Sudah Diikuti", "Tidak Relevan"].map(s => <option key={s}>{s}</option>)}
            </select>
            <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 7 }}>Catatan Internal</div>
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Tulis catatan koordinasi, kebutuhan dokumen, atau keputusan go/no-go..." style={{ width: "100%", minHeight: 88 }} />
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginTop: 9 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <Button className="primary small" onClick={saveNote}><Save size={14} />Simpan Catatan</Button>
                {note && savedAt && <Button className="ghost small" onClick={deleteNote}><Trash2 size={14} />Hapus</Button>}
              </div>
              {savedAt && <span className="muted" style={{ fontSize: 11 }}>Tersimpan {savedAt}</span>}
            </div>
          </div>

          <div className="card" style={{ boxShadow: "none", background: "#f8fbff", padding: 12 }}>
            <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 9 }}>Assign PIC Tender</div>
            <select value={assignedPIC} onChange={e => assignPIC(e.target.value)} style={{ width: "100%" }}>
              <option value="">-- Pilih PIC Tender --</option>
              {users.filter(u => u.aktif).map(u => <option key={u.id} value={u.id}>{u.nama} ({u.role})</option>)}
            </select>
          </div>
        </div>
      );
    }

    function MiniKpi({ label, value, color = "#0e1726" }) {
      return (
        <div style={{ border: "1px solid var(--border)", background: "#f8fbff", borderRadius: 12, padding: 10 }}>
          <div className="muted" style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".04em" }}>{label}</div>
          <div style={{ fontSize: 17, fontWeight: 800, color, marginTop: 3 }}>{value}</div>
        </div>
      );
    }

    function RupPage({ rupPlans, keywordCount, openRup }) {
      const [filter, setFilter] = useState({ search: "", portfolio: "Semua", jenis: "Semua", provinsi: "Semua", metode: "Semua" });
      const setRupFilter = (patch) => setFilter(prev => ({ ...prev, ...patch }));
      const filtered = useMemo(() => rupPlans.filter(r => {
        const q = filter.search.trim().toLowerCase();
        if (keywordCount > 0 && r.matched.length === 0) return false;
        if (q && !`${r.nama_paket} ${r.nama_klpd} ${r.nama_satker}`.toLowerCase().includes(q)) return false;
        if (filter.portfolio !== "Semua" && r.recommendation !== filter.portfolio) return false;
        if (filter.jenis !== "Semua" && r.jenis_klpd !== filter.jenis) return false;
        if (filter.provinsi !== "Semua" && r.provinsi !== filter.provinsi) return false;
        if (filter.metode !== "Semua" && r.metode_pengadaan !== filter.metode) return false;
        return true;
      }), [rupPlans, filter, keywordCount]);

      const totalPagu = filtered.reduce((sum, r) => sum + r.pagu, 0);
      const urgent = filtered.filter(r => r.daysUntilSelection <= 60).length;
      const byPortfolio = ["FLP", "SDA", "FITI"].map(p => ({ p, list: filtered.filter(r => r.recommendation === p) }));
      const jenisOptions = Array.from(new Set(rupPlans.map(r => r.jenis_klpd))).sort();
      const metodeOptions = Array.from(new Set(rupPlans.map(r => r.metode_pengadaan))).sort();

      return (
        <div>
          <PageTitle
            title="RUP Pipeline"
            subtitle="Rencana Umum Pengadaan masih berupa rencana paket; jika benar ditenderkan, paketnya akan muncul di LPSE."
            right={<Button className="ghost" onClick={() => setFilter({ search: "", portfolio: "Semua", jenis: "Semua", provinsi: "Semua", metode: "Semua" })}><X size={16} />Clear Filter</Button>}
          />

          <div className="grid-4" style={{ marginBottom: 16 }}>
            <KpiCard label="RUP Terpantau" value={filtered.length} sub={`${rupPlans.length} paket dummy`} icon={FileText} />
            <KpiCard label="Pagu Pipeline" value={formatRupiah(totalPagu)} sub="akumulasi pagu RUP" icon={TrendingUp} color="#16a34a" bg="#dcfce7" />
            <KpiCard label="Pemilihan <=60 Hari" value={urgent} sub="prioritas pra-tender" icon={Clock} color="#d97706" bg="#fef3c7" />
            <KpiCard label="Keyword Aktif" value={keywordCount} sub={keywordCount ? "RUP difilter keyword" : "semua RUP tampil"} icon={Tag} color="#7c3aed" bg="#f3e8ff" />
          </div>

          <div className="grid-3" style={{ marginBottom: 16 }}>
            {byPortfolio.map(row => (
              <Card key={row.p} className="clickable" onClick={() => setRupFilter({ portfolio: row.p })}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                  <div>
                    <Badge color={portfolioColor[row.p]}>{row.p}</Badge>
                    <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: "-.03em", marginTop: 10 }}>{row.list.length}</div>
                    <div className="muted" style={{ fontSize: 12 }}>paket RUP</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div className="muted" style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase" }}>Pagu</div>
                    <div style={{ fontWeight: 800, fontSize: 18 }}>{formatRupiah(row.list.reduce((sum, r) => sum + r.pagu, 0))}</div>
                  </div>
                </div>
              </Card>
            ))}
          </div>

          <Card style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ position: "relative" }}>
                <Search size={15} style={{ position: "absolute", left: 12, top: 12, color: "#94a3b8" }} />
                <input placeholder="Cari paket, KLPD, satker..." value={filter.search} onChange={e => setRupFilter({ search: e.target.value })} style={{ paddingLeft: 34, minWidth: 260 }} />
              </div>
              <div className="pill-tabs">
                {["Semua", "FLP", "SDA", "FITI"].map(p => <button key={p} className={`pill-tab ${filter.portfolio === p ? "active" : ""}`} onClick={() => setRupFilter({ portfolio: p })}>{p}</button>)}
              </div>
              <select value={filter.jenis} onChange={e => setRupFilter({ jenis: e.target.value })}>
                <option>Semua</option>
                {jenisOptions.map(j => <option key={j}>{j}</option>)}
              </select>
              <select value={filter.metode} onChange={e => setRupFilter({ metode: e.target.value })}>
                <option>Semua</option>
                {metodeOptions.map(m => <option key={m}>{m}</option>)}
              </select>
              <select value={filter.provinsi} onChange={e => setRupFilter({ provinsi: e.target.value })}>
                <option>Semua</option>
                {PROVINCES.map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
          </Card>

          <Card style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ overflowX: "auto" }}>
              <table>
                <thead>
                  <tr>
                    <th>Nama Paket RUP</th>
                    <th>KLPD / Satker</th>
                    <th>Jenis KLPD</th>
                    <th>Pagu</th>
                    <th>Metode</th>
                    <th>Portofolio</th>
                    <th>Jadwal Pemilihan</th>
                    <th>Lokasi</th>
                    <th>Countdown</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(r => {
                    const isNew = [102, 107, 115].includes(r.id); // Simulasi indikator RUP baru
                    return (
                      <tr key={r.id} style={{ background: isNew ? "#f0fdf4" : undefined }}>

                        <td style={{ minWidth: 210 }}>
                          <div style={{ fontSize: 12, fontWeight: 800 }}>{r.nama_klpd}</div>
                          <div className="muted" style={{ fontSize: 11 }}>{r.nama_satker}</div>

                        <td style={{ fontWeight: 800, whiteSpace: "nowrap" }}>{formatRupiah(r.pagu)}</td>
                        <td><Badge color={r.metode_pengadaan === "Seleksi" ? "indigo" : "gray"}>{r.metode_pengadaan}</Badge></td>
                        <td><Badge color={portfolioColor[r.recommendation]}>{r.recommendation}</Badge></td>
                        <td style={{ fontSize: 12, minWidth: 150, whiteSpace: "nowrap" }}>
                          <div style={{ fontWeight: 800 }}>{formatMonthYear(r.tgl_awal_pemilihan)}</div>
                        </td>

                    }} style={{ flex: 1 }} />
                    <input placeholder="Tahun (Masuk - Keluar)" value={p.tahunMasukKeluar} onChange={e => {
                      const safeCv = typeof cv === 'object' && cv !== null ? cv : { pendidikan: [], pekerjaan: [] };
                      const newPek = [...(safeCv.pekerjaan || [])]; newPek[i].tahunMasukKeluar = e.target.value; setCV({ ...safeCv, pekerjaan: newPek });
                    }} style={{ width: 180 }} />
                    <Button className="ghost small" onClick={() => {
                      const safeCv = typeof cv === 'object' && cv !== null ? cv : { pendidikan: [], pekerjaan: [] };
                      const newPek = (safeCv.pekerjaan || []).filter((_, idx) => idx !== i); setCV({ ...safeCv, pekerjaan: newPek });
                    }}><Trash2 size={14} /></Button>
                  </div>
                  <input placeholder="Deskripsi Singkat Jobdesk" value={p.deskripsi} onChange={e => {
                    const safeCv = typeof cv === 'object' && cv !== null ? cv : { pendidikan: [], pekerjaan: [] };
                    const newPek = [...(safeCv.pekerjaan || [])]; newPek[i].deskripsi = e.target.value; setCV({ ...safeCv, pekerjaan: newPek });
                  }} style={{ width: "100%" }} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function SettingsPage({ keywords, updateKeyword, removeKeyword, addKeyword, notifications, setNotifications, coverage, setCoverage, hpsThreshold, setHpsThreshold, users, setUsers }) {
      const [drafts, setDrafts] = useState({ FLP: "", SDA: "", FITI: "" });
      const [userDraft, setUserDraft] = useState({ nama: "", role: "PIC Tender", email: "" });
      return (
        <div>
          <PageTitle title="Pengaturan" subtitle="Konfigurasi keyword, wilayah pantauan, threshold nilai proyek, notifikasi, dan user SBU LSI." />
          <div className="grid-2">
            <Card style={{ gridColumn: "1 / -1" }}>
              <div className="section-title" style={{ marginBottom: 12 }}>Manajemen Keyword per Sub-Portofolio</div>
              <div className="grid-3">
                {["FLP", "SDA", "FITI"].map(portfolio => (
                  <div key={portfolio} style={{ border: "1px solid var(--border)", borderRadius: 14, padding: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <Badge color={portfolioColor[portfolio]}>{portfolio}</Badge>
                      <span className="muted" style={{ fontSize: 11, fontWeight: 800 }}>{keywords[portfolio].length} keyword</span>
                    </div>
                    <div style={{ display: "grid", gap: 7 }}>
                      {keywords[portfolio].map(k => (
                        <div key={k.id} style={{ display: "flex", gap: 7, alignItems: "center" }}>
                          <button className={`switch ${k.active ? "on" : ""}`} onClick={() => updateKeyword(portfolio, k.id, { active: !k.active })} aria-label="Toggle keyword" />
                          <input value={k.text} onChange={e => updateKeyword(portfolio, k.id, { text: e.target.value })} style={{ flex: 1, minWidth: 0, padding: "7px 10px", borderRadius: 10 }} />
                          <button className="btn small ghost" onClick={() => removeKeyword(portfolio, k.id)}><Trash2 size={13} /></button>
                        </div>
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 7, marginTop: 10 }}>
                      <input placeholder="Tambah keyword..." value={drafts[portfolio]} onChange={e => setDrafts(p => ({ ...p, [portfolio]: e.target.value }))} style={{ flex: 1, minWidth: 0 }} />
                      <Button className="primary small" onClick={() => { addKeyword(portfolio, drafts[portfolio]); setDrafts(p => ({ ...p, [portfolio]: "" })); }}><Plus size={14} /></Button>
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            <Card>
              <div className="section-title" style={{ marginBottom: 12 }}>Coverage Wilayah</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2,minmax(0,1fr))", gap: 8 }}>
                {coverage.map((p, i) => (
                  <label key={p.name} style={{ display: "flex", alignItems: "center", gap: 8, border: "1px solid", borderColor: p.active ? "#bfdbfe" : "var(--border)", background: p.active ? "#eff6ff" : "#fff", borderRadius: 12, padding: "8px 10px", cursor: "pointer" }}>
                    <input type="checkbox" checked={p.active} onChange={() => setCoverage(prev => prev.map((x, j) => j === i ? { ...x, active: !x.active } : x))} style={{ accentColor: "#2563eb" }} />
                    <span style={{ fontSize: 12, fontWeight: 800, color: p.active ? "#1d4ed8" : "#64748b" }}>{p.name}</span>
                  </label>
                ))}
              </div>
            </Card>

            <div style={{ display: "grid", gap: 14 }}>
              <Card>
                <div className="section-title" style={{ marginBottom: 10 }}>Threshold Nilai Proyek</div>
                <div className="muted" style={{ fontSize: 12, marginBottom: 8 }}>Minimum HPS yang tampil di Tender Intelligence.</div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input type="number" value={hpsThreshold} onChange={e => setHpsThreshold(e.target.value)} style={{ flex: 1 }} />
                  <span style={{ fontSize: 13, fontWeight: 800, color: "#64748b" }}>juta Rp</span>
                </div>
                <div style={{ marginTop: 10 }}><Badge color="blue">Aktif: min Rp {hpsThreshold} jt</Badge></div>
              </Card>

              <Card>
                <div className="section-title" style={{ marginBottom: 10 }}>Notifikasi</div>
                {[
                  ["baru", "Tender Baru Masuk"],
                  ["deadline", "Deadline <=7 Hari"],
                  ["status", "Perubahan Status"],
                  ["ta", "TA Tersedia"],
                ].map(([key, label]) => (
                  <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderTop: "1px solid #f1f5f9" }}>
                    <span style={{ fontSize: 13, fontWeight: 700 }}>{label}</span>
                    <button className={`switch ${notifications[key] ? "on" : ""}`} onClick={() => setNotifications(prev => ({ ...prev, [key]: !prev[key] }))} />
                  </div>
                ))}
              </Card>

              <Card>
                <div className="section-title" style={{ marginBottom: 10 }}>User SBU LSI</div>
                <div style={{ display: "grid", gap: 8, marginBottom: 12 }}>
                  {users.map(u => (
                    <div key={u.id} style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8, alignItems: "center", border: "1px solid var(--border)", borderRadius: 12, padding: 9, background: u.aktif ? "#fff" : "#f8fafc" }}>
                      <div style={{ minWidth: 0 }}>
                        <input value={u.nama} onChange={e => setUsers(prev => prev.map(x => x.id === u.id ? { ...x, nama: e.target.value } : x))} style={{ width: "100%", fontWeight: 800, padding: "7px 9px", borderRadius: 10, marginBottom: 6 }} />
                        <div className="muted" style={{ fontSize: 11 }}>{u.role} - {u.email}</div>
                      </div>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <button className={`switch ${u.aktif ? "on" : ""}`} onClick={() => setUsers(prev => prev.map(x => x.id === u.id ? { ...x, aktif: !x.aktif } : x))} />
                        <button className="btn small ghost" onClick={() => setUsers(prev => prev.filter(x => x.id !== u.id))}><Trash2 size={13} /></button>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "grid", gap: 8 }}>
                  <input placeholder="Nama user" value={userDraft.nama} onChange={e => setUserDraft(p => ({ ...p, nama: e.target.value }))} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    <select value={userDraft.role} onChange={e => setUserDraft(p => ({ ...p, role: e.target.value }))}>
                      <option>Admin SBU LSI</option>
                      <option>PIC Tender</option>
                      <option>PIC FLP</option>
                      <option>PIC SDA</option>
                      <option>PIC FITI</option>
                      <option>Viewer</option>
                    </select>
                    <input placeholder="Email" value={userDraft.email} onChange={e => setUserDraft(p => ({ ...p, email: e.target.value }))} />
                  </div>
                  <Button className="primary small" style={{ justifySelf: "start" }} onClick={() => {
                    if (!userDraft.nama.trim()) return;
                    setUsers(prev => [...prev, { id: Date.now(), nama: userDraft.nama.trim(), role: userDraft.role, email: userDraft.email.trim() || "-", aktif: true }]);
                    setUserDraft({ nama: "", role: "PIC Tender", email: "" });
                  }}><UserPlus size={14} />Tambah User</Button>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    }

    export default App;
    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
