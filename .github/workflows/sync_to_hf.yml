name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set in GitHub Secrets"
            exit 1
          fi
          
          # Configure git identity
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Create a clean branch without binary files
          git checkout -b hf-deploy
          
          # Remove binary files from current commit and history
          git filter-branch -f --index-filter 'git rm --cached --ignore-unmatch frontend/public/assets/sucofindo-logo.png' HEAD
          
          # Push to Hugging Face
          git remote add hf https://spatiallity:$HF_TOKEN@huggingface.co/spaces/spatiallity/tenderhub-api
          git push hf hf-deploy:main --force
