name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set in GitHub Secrets"
            exit 1
          fi
          
          # Configure git identity
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Remove binary files if they exist
          if [ -f "frontend/public/assets/sucofindo-logo.png" ]; then
            git rm --cached frontend/public/assets/sucofindo-logo.png || true
            git commit -m "chore: remove binary assets for HF deployment" || true
          fi
          
          # Add HF remote
          git remote add hf https://spatiallity:$HF_TOKEN@huggingface.co/spaces/spatiallity/tenderhub-api || true
          
          # Push to Hugging Face (force to override any conflicts)
          git push hf HEAD:main --force
          
          echo "✅ Successfully synced to Hugging Face Spaces"
