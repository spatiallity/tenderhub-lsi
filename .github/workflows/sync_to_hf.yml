name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true                    # resolve LFS pointers to real files

      - name: Install Git LFS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs pull

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set in GitHub Secrets"
            exit 1
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Orphan branch — clean history for HF.
          git checkout --orphan hf-deploy

          # Strip raw binaries HF rejects (it requires Xet/LFS for these).
          # Keep TEMPLATE_CV_EXPERT.docx — it ships via LFS (.gitattributes).
          rm -f frontend/public/assets/sucofindo-logo.png
          find . -path ./.git -prune -o -type f \( \
              -iname '*.docx' -o \
              -iname '*.doc'  -o \
              -iname '*.xlsx' -o \
              -iname '*.xls'  -o \
              -iname '*.pdf'  -o \
              -iname '*.png'  -o \
              -iname '*.jpg'  -o \
              -iname '*.jpeg' -o \
              -iname '*.gif'  -o \
              -iname '*.zip'  -o \
              -iname '~$*'    \
            \) ! -name 'TEMPLATE_CV_EXPERT.docx' -print -delete || true

          # Re-track template via LFS on the deploy branch so HF stores it via Xet/LFS.
          cat > .gitattributes <<'GA'
          TEMPLATE_CV_EXPERT.docx filter=lfs diff=lfs merge=lfs -text
          GA

          git add -A
          git commit -m "Deploy to HuggingFace Space"

          git remote add hf https://spatiallity:$HF_TOKEN@huggingface.co/spaces/spatiallity/tenderhub-api || true

          # LFS objects must reach HF too.
          git lfs push --all hf || true
          git push hf hf-deploy:main --force

          echo "Successfully synced to Hugging Face Spaces"
