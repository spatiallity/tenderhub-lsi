name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true                    # resolve LFS pointers to real files

      - name: Install Git LFS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs pull

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set in GitHub Secrets"
            exit 1
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Orphan branch — clean history for HF.
          git checkout --orphan hf-deploy
          git add -A

          # Drop every binary file from the index AND the working tree —
          # HF Spaces rejects raw blobs of these formats. The template is the
          # only exception (it's LFS-tracked and ships via Xet).
          BIN_PATTERNS='\.(docx|doc|xlsx|xls|pdf|png|jpg|jpeg|gif|zip)$|(^|/)~\$'

          # Files to drop = tracked files matching binary regex MINUS template.
          mapfile -t DROP < <(
            git ls-files | grep -iE "$BIN_PATTERNS" | grep -v '^TEMPLATE_CV_EXPERT\.docx$' || true
          )

          if [ "${#DROP[@]}" -gt 0 ]; then
            printf 'Dropping binary file: %s\n' "${DROP[@]}"
            git rm -f --quiet "${DROP[@]}"
            # Remove leftovers from filesystem too (e.g. files added by lfs pull
            # that are no longer in the index).
            for f in "${DROP[@]}"; do rm -f "$f"; done
          else
            echo "No binary files matched."
          fi

          # Make sure the template stays in the index as an LFS pointer.
          # Regen .gitattributes so HF treats it as LFS.
          cat > .gitattributes <<'GA'
          TEMPLATE_CV_EXPERT.docx filter=lfs diff=lfs merge=lfs -text
          GA
          git add .gitattributes TEMPLATE_CV_EXPERT.docx

          git commit -m "Deploy to HuggingFace Space"

          git remote remove hf 2>/dev/null || true
          git remote add hf https://spatiallity:$HF_TOKEN@huggingface.co/spaces/spatiallity/tenderhub-api

          # LFS objects must reach HF too (template).
          git lfs push --all hf || true
          git push hf hf-deploy:main --force

          echo "Successfully synced to Hugging Face Spaces"
