name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set in GitHub Secrets"
            exit 1
          fi
          
          # Configure git identity
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Create a new orphan branch (no history)
          git checkout --orphan hf-deploy
          
          # Remove binary files before committing
          rm -f frontend/public/assets/sucofindo-logo.png
          rm -f .gitattributes
          
          # Add all files (except removed binaries)
          git add -A
          
          # Create initial commit
          git commit -m "Deploy to HuggingFace Space (no binary files)"
          
          # Add HF remote
          git remote add hf https://spatiallity:$HF_TOKEN@huggingface.co/spaces/spatiallity/tenderhub-api || true
          
          # Force push to HuggingFace (orphan branch = clean history)
          git push hf hf-deploy:main --force
          
          echo "✅ Successfully synced to Hugging Face Spaces"
